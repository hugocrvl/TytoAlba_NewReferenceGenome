
# Chromosome name, size and color definition
karyotype = ./TextFiles/Father_Karyotype.txt, ./TextFiles/Mother_Karyotype.txt

# To define the chromosomal unit, here 1 Mb
chromosomes_units = 1000000
# To explicitly define the order of the ideograms
chromosomes_order = Mo_chr1, Mo_chr2, Mo_chr3, Mo_chr4, Mo_chr5, Mo_chr6, Mo_chr7, Mo_chr8, Mo_chr9, Mo_chr10, Mo_chr11, Mo_chr12, Mo_chr13, Mo_chr14, Mo_chr15, Mo_chr16, Mo_chr17, Mo_chr18, Mo_chr19, Mo_chr20, Mo_chr21, Mo_chr22, Mo_chr23, Mo_chr24, Mo_chr25, Mo_chr26, Mo_chr27, Mo_chr28, Mo_chr29, Mo_chr30, Mo_chr31, Mo_chr32, Mo_chr33, Mo_chr34, Mo_chr35, Mo_chr36, Mo_chr37, Mo_chr38, Mo_chr39, Mo_chr40, Mo_chr41, Mo_chr42, Mo_chr43, Mo_chr44, Mo_chr45, Mo_chrZ, Fa_chrZ, Fa_chr45, Fa_chr44, Fa_chr43, Fa_chr42, Fa_chr41, Fa_chr40, Fa_chr39, Fa_chr38, Fa_chr37, Fa_chr36, Fa_chr35, Fa_chr34, Fa_chr33, Fa_chr32, Fa_chr31, Fa_chr30, Fa_chr29, Fa_chr28, Fa_chr27, Fa_chr26, Fa_chr25, Fa_chr24, Fa_chr23, Fa_chr22, Fa_chr21, Fa_chr20, Fa_chr19, Fa_chr18, Fa_chr17, Fa_chr16, Fa_chr15, Fa_chr14, Fa_chr13, Fa_chr12, Fa_chr11, Fa_chr10, Fa_chr9, Fa_chr8, Fa_chr7, Fa_chr6, Fa_chr5, Fa_chr4, Fa_chr3, Fa_chr2, Fa_chr1
# To have the scale of each chromosome reversed
chromosomes_reverse = Fa_chrZ, Fa_chr45, Fa_chr44, Fa_chr43, Fa_chr42, Fa_chr41, Fa_chr40, Fa_chr39, Fa_chr38, Fa_chr37, Fa_chr36, Fa_chr35, Fa_chr34, Fa_chr33, Fa_chr32, Fa_chr31, Fa_chr30, Fa_chr29, Fa_chr28, Fa_chr27, Fa_chr26, Fa_chr25, Fa_chr24, Fa_chr23, Fa_chr22, Fa_chr21, Fa_chr20, Fa_chr19, Fa_chr18, Fa_chr17, Fa_chr16, Fa_chr15, Fa_chr14, Fa_chr13, Fa_chr12, Fa_chr11, Fa_chr10, Fa_chr9, Fa_chr8, Fa_chr7, Fa_chr6, Fa_chr5, Fa_chr4, Fa_chr3, Fa_chr2, Fa_chr1

# The <ideogram> block defines the position, size, labels and other
# properties of the segments on which data are drawn. These segments
# are usually chromosomes, but can be any integer axis.

<ideogram>

# Adding label of each chromosome
show_label     = yes
label_with_tag = no
label_font     = light
label_radius   = dims(ideogram,radius_outer) + 0.05r
label_center   = yes
label_size     = 30p
label_color    = black
label_parallel = no
label_case     = upper
label_format   = var(label)

<spacing>

# Overall spacing
default = 0.005r

# Pairwise spacing between Father and Mother haplotypes
# <pairwise Mo_chr1 Fa_chr1>
# spacing = 50u
# </pairwise>

# <pairwise Mo_chrZ Fa_chrZ>
# spacing = 50u
# </pairwise>

</spacing>

# Ideogram position, thickness and fill. 
#
# Radial position within the image of the ideograms. This value is
# usually relative ("r" suffix).
radius           = 0.8r

# Thickness of ideograms, which can be absolute (e.g. pixels, "p"
# suffix) or relative ("r" suffix). When relative, it is a fraction of
# image radius.
thickness        = 20p

# Ideograms can be drawn as filled, outlined, or both. When filled,
# the color will be taken from the last field in the karyotype file,
# or set by chromosomes_colors. 

# When stroke_thickness=0p or if the parameter is missing, the ideogram is
# has no outline and the value of stroke_color is not used.

fill             = yes  
stroke_color     = dgrey
stroke_thickness = 0p   

</ideogram>

<links>

# Similar orientation

<link>
file = ./TextFiles/Alignment_SimilarOrientation.txt
color         = linkssimilar
radius        = 0.85r
bezier_radius = 0.1r
thickness     = 1
ribbon = yes
flat = yes

</link>

# Opposite orientation

<link>
file = ./TextFiles/Alignment_OppositeOrientation.txt
color         = linksopposite
radius        = 0.85r
bezier_radius = 0.1r
thickness     = 1
ribbon = yes
flat = yes

</link>

</links>

<plots>

# Repeat distribution of Father haplotype

    <plot>

    show = yes
    type = histogram

    file = ./TextFiles/RepeatDistribution_Father.txt
    r1 = 1.2r
    r0 = 1.1r
    max = 1.0
    min = 0.0

    stroke_thickness = 0
    fill_color = repeats

    </plot>

# Repeat distribution of Mother haplotype

    <plot>

    show = yes
    type = histogram

    file = ./TextFiles/RepeatDistribution_Mother.txt
    r1 = 1.2r
    r0 = 1.1r
    max = 1.0
    min = 0.0

    stroke_thickness = 0
    fill_color = repeats

    </plot>

# Gene density of Father haplotype

    <plot>

    show = yes
    type = histogram

    file = ./TextFiles/GD_Father.txt
    r1 = 0.975r
    r0 = 0.875r
    max = 20
    min = 0

    stroke_thickness = 0
    fill_color = genedensity

    </plot>

# Gene density of Mother haplotype

    <plot>

    show = yes
    type = histogram

    file = ./TextFiles/GD_Mother.txt
    r1 = 0.975r
    r0 = 0.875r
    max = 22
    min = 1

    stroke_thickness = 0
    fill_color = genedensity

    </plot>

# Adding the telomeres on both haplotypes

    <plot>

    show = yes
    type = scatter

    file = ./TextFiles/Telomeric_Positions.txt
    r0 = 1r-9.5p
    r1 = 1r-9.5p

    glyph = circle
    glyph_size = 12.5p
    color = telomeres

    </plot>

# Adding the pericentromeres on both haplotypes

    <plot>

    show = yes
    type = scatter

    file = ./TextFiles/Pericentromeric_Positions.txt
    r0 = 1r-9.5p
    r1 = 1r-9.5p

    glyph = square
    glyph_size = 12.5p
    color = pericentromeres

    </plot>

</plots>

################################################################

# Creation of the image
<image>
<<include ./ConfigurationFiles/image.conf>>
</image>

# Setting the colours, fonts and patterns. 
# It calls other files: etc/colors.conf, etc/fonts.conf, etc/patterns.conf
<<include etc/colors_fonts_patterns.conf>> 

# Debugging, I/O an dother system parameters
# Included from Circos distribution.
<<include etc/housekeeping.conf>>